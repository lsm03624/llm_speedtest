<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Speed Test Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #282c34;
            --bg-panel: #21252b;
            --text-main: #abb2bf;
            --text-muted: #5c6370;
            --accent-blue: #61afef;
            --accent-green: #98c379;
            --accent-purple: #c678dd;
            --accent-yellow: #e5c07b;
            --accent-red: #e06c75;
            --border-color: #3e4451;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            box-sizing: border-box;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }

        .header-sub {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .tabs-side {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .tabs-utility {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .tabs-community {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-main);
        }

        .tab-btn {
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            border-color: var(--accent-blue);
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: #282c34;
            border-color: var(--accent-blue);
        }

        /* Table */
        .table-container {
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th,
        td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--accent-green);
            font-weight: bold;
            position: sticky;
            top: 0;
            background: var(--bg-panel);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-detail {
            background: var(--accent-purple);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-detail:hover {
            opacity: 0.9;
        }

        /* Modal for Charts */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--bg-dark);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid var(--border-color);
            width: 95%;
            max-width: 1600px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .close-btn {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            margin-top: -10px;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        /* Tooltip for Notes */
        .notes-cell {
            position: relative;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-muted);
            max-width: 150px;
            white-space: nowrap;
        }

        .notes-text {
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: bottom;
        }

        .notes-tooltip {
            visibility: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
            text-align: left;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            white-space: normal;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            /* Prevent tooltip from interfering with hover */
        }

        .notes-cell:hover .notes-tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Small arrow for tooltip */
        .notes-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--border-color) transparent transparent transparent;
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-yellow);
            font-size: 16px;
        }

        .entry-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.14);
            color: var(--text-main);
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .entry-link-btn:hover {
            border-color: var(--accent-blue);
            color: #fff;
            transform: translateY(-1px);
        }

        button.entry-link-btn {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            font: inherit;
        }

        .entry-link-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #11161d;
        }

        .community-title {
            color: var(--accent-yellow);
            font-size: 12px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(229, 192, 123, 0.12);
            white-space: nowrap;
        }

        .community-meta {
            color: var(--text-main);
            font-size: 12px;
            line-height: 1.4;
        }

        .community-copy-btn {
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            border-radius: 999px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

        .community-copy-btn:hover {
            opacity: 0.9;
        }

        .model-tags-panel {
            margin-bottom: 18px;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(97, 175, 239, 0.14), rgba(33, 37, 43, 0.92));
        }

        .model-tags-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .model-tags-title {
            color: var(--accent-blue);
            font-size: 14px;
            font-weight: bold;
        }

        .model-tags-subtitle {
            color: var(--text-muted);
            font-size: 12px;
        }

        .model-tag-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .model-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .model-tag:hover {
            border-color: var(--accent-blue);
            color: #fff;
            transform: translateY(-1px);
        }

        .model-tag.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #11161d;
            font-weight: bold;
        }

        .model-tag-count {
            min-width: 20px;
            padding: 2px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: inherit;
            font-size: 12px;
            text-align: center;
        }

        .leaderboard-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 0;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.16);
        }

        .leaderboard-tools-wrap {
            margin-bottom: 14px;
        }

        .mobile-filter-toggle {
            display: none;
            width: 100%;
            margin-bottom: 8px;
            background: rgba(97, 175, 239, 0.12);
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-align: left;
            transition: all 0.2s ease;
        }

        .mobile-filter-toggle:hover {
            border-color: var(--accent-blue);
            color: #fff;
        }

        .leaderboard-tools-wrap.collapsed .leaderboard-tools {
            display: none;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 120px;
        }

        .tool-group label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .tool-group input,
        .tool-group select {
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 13px;
        }

        .rank-cell {
            font-weight: bold;
            min-width: 84px;
        }

        tr.top-rank-1 {
            background: rgba(229, 192, 123, 0.16);
        }

        tr.top-rank-2 {
            background: rgba(171, 178, 191, 0.12);
        }

        tr.top-rank-3 {
            background: rgba(198, 120, 221, 0.12);
        }

        .btn-copy-link {
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 6px;
        }

        .btn-copy-link:hover {
            opacity: 0.9;
        }

        .sortable-header {
            padding: 0;
        }

        .sort-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 15px;
            background: transparent;
            color: inherit;
            border: none;
            font: inherit;
            text-align: left;
            cursor: pointer;
        }

        .sort-toggle:hover {
            color: var(--accent-blue);
        }

        .sort-label {
            line-height: 1.35;
        }

        .sort-indicator {
            min-width: 18px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: right;
        }

        .sort-indicator.active {
            color: var(--accent-yellow);
        }

        @media (max-width: 900px) {
            body {
                padding: 8px;
            }

            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 22px;
                margin: 0 0 4px;
            }

            .header-sub {
                font-size: 12px;
                margin-bottom: 12px;
            }

            .tabs {
                gap: 8px;
                margin-bottom: 10px;
                align-items: stretch;
            }

            .tab-btn {
                padding: 7px 10px;
                font-size: 13px;
            }

            .tabs-side {
                width: 100%;
                margin-left: 0;
                align-items: stretch;
            }

            .tabs-utility {
                justify-content: flex-start;
                gap: 6px;
            }

            .tabs-community {
                width: 100%;
                font-size: 10px;
            }

            .community-meta {
                font-size: 10px;
                line-height: 1.25;
            }

            .entry-link-btn,
            .community-copy-btn {
                min-height: 26px;
                padding: 0 9px;
                font-size: 11px;
            }

            .model-tags-panel {
                margin-bottom: 8px;
                padding: 8px;
            }

            .model-tags-header {
                margin-bottom: 6px;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .model-tags-title {
                font-size: 12px;
            }

            .model-tags-subtitle {
                font-size: 11px;
                line-height: 1.3;
            }

            .model-tag-bar {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: 6px;
                padding-bottom: 2px;
            }

            .model-tag {
                flex: 0 0 auto;
                padding: 5px 9px;
                font-size: 11px;
            }

            .leaderboard-tools-wrap {
                margin-bottom: 10px;
            }

            .mobile-filter-toggle {
                display: block;
            }

            .leaderboard-tools {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                padding: 8px;
            }

            .leaderboard-tools .tool-group {
                width: auto !important;
                min-width: 0 !important;
            }

            .leaderboard-tools .tool-group label {
                font-size: 11px;
            }

            .leaderboard-tools .tool-group input,
            .leaderboard-tools .tool-group select {
                font-size: 12px;
                padding: 5px 6px;
            }

            .leaderboard-tools .tab-btn {
                width: 100%;
                padding: 6px 8px;
                font-size: 12px;
            }

            .table-container {
                padding: 8px;
                border-radius: 6px;
            }

            #resultsTable {
                font-size: 11px;
                table-layout: fixed;
            }

            #resultsTable th,
            #resultsTable td {
                padding: 5px 3px;
            }

            .sort-toggle {
                padding: 5px 3px;
                gap: 3px;
            }

            .sort-label {
                line-height: 1.25;
                font-size: 11px;
            }

            .sort-indicator {
                min-width: 12px;
                font-size: 10px;
            }

            .col-rank,
            .col-time,
            .col-share-id,
            .col-user,
            .col-notes,
            .col-concurrency {
                display: none;
            }

            .col-model,
            .col-config {
                white-space: normal;
                word-break: break-word;
                line-height: 1.28;
                vertical-align: top;
            }

            .col-model {
                width: 24%;
                min-width: 78px;
                font-size: 11px;
            }

            .col-config {
                width: 28%;
                min-width: 90px;
                font-size: 10px;
                color: var(--text-muted);
            }

            .col-prefill,
            .col-decode {
                width: 16%;
                min-width: 54px;
                text-align: right;
                font-variant-numeric: tabular-nums;
            }

            .col-actions {
                width: 16%;
                min-width: 58px;
                text-align: center;
                position: sticky;
                right: 0;
                background: var(--bg-panel);
                z-index: 3;
                white-space: nowrap;
            }

            .btn-detail {
                font-size: 10px;
                padding: 4px 5px;
            }

            .btn-copy-link {
                display: none;
            }

            #paginationControls {
                margin-top: 10px !important;
            }

            #paginationControls .tab-btn {
                padding: 4px 8px !important;
                margin: 0 3px !important;
                font-size: 12px;
            }

            .modal-content {
                width: 98%;
                margin: 2% auto;
                padding: 12px;
            }

            .chart-box {
                padding: 8px;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 6px;
            }

            h1 {
                font-size: 19px;
            }

            .header-sub {
                font-size: 11px;
                margin-bottom: 8px;
            }

            .tabs {
                gap: 6px;
            }

            .tab-btn {
                padding: 6px 8px;
                font-size: 12px;
            }

            .leaderboard-tools {
                grid-template-columns: 1fr;
            }

            .col-model {
                min-width: 72px;
            }

            .col-config {
                min-width: 82px;
            }

            .col-prefill,
            .col-decode {
                min-width: 50px;
            }

            .col-actions {
                min-width: 54px;
            }
        }

        @media (max-width: 560px) {
            #resultsTable {
                font-size: 10px;
            }

            #resultsTable th,
            #resultsTable td {
                padding: 5px 3px;
            }

            .sort-label {
                font-size: 10px;
            }

            .col-model {
                min-width: 68px;
            }

            .col-config {
                min-width: 78px;
            }

            .col-prefill,
            .col-decode {
                min-width: 46px;
            }

            .col-actions {
                min-width: 54px;
            }

            .btn-detail {
                font-size: 10px;
                padding: 3px 4px;
            }
        }

            padding: 8px;
        }

    <script>
        const SUPABASE_URL = 'https://cvezaerrczywfzqcaqmx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2ZXphZXJyY3p5d2Z6cWNhcW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzc0OTAsImV4cCI6MjA4ODA1MzQ5MH0.-9l2Wcj38m6xh9sz9qMdhdNbnAZ_XoFBSHPhEud9DmQ';
        const SB_HEADERS = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY };
        const USER_CODE_KEY = 'llm_speedtest_user_code';

        const SORTABLE_FIELDS = ['created_at', 'avg_prefill_speed', 'avg_decode_speed'];
        const MODEL_TAG_MIN_COUNT = 4;
        const MODEL_TAG_PAGE_SIZE = 1000;
        const MODEL_TAG_FETCH_LIMIT = 3000;

        let currentMode = 'global';
        let currentTargetUserCode = null;
        let currentTargetModelName = null;
        let currentTargetSearch = null;
        let currentPage = 1;
        const PAGE_SIZE = 100;
        let currentPageSize = PAGE_SIZE;
        let currentSortKey = 'created_at';
        let currentSortDirection = 'desc';
        let currentMinDecode = 0;
        let currentMinPrefill = 0;
        let currentHardwareKeyword = '';
        let resultsDataMap = {}; // store details for chart generation
        let currentFetchController = null; // To prevent race conditions on tab switch
        let modelTagFetchController = null;
        let currentModelTags = [];
        let pendingDeepLinkShareId = null;
        const VIEW_MODE_STORAGE_KEY = 'llm_speedtest_leaderboard_view_mode';
        let manualMobileView = false;
        try {
            manualMobileView = localStorage.getItem(VIEW_MODE_STORAGE_KEY) === 'mobile';
        } catch {
            manualMobileView = false;
        }
        let wasMobileViewport = manualMobileView || window.matchMedia('(max-width: 900px)').matches;
        let mobileFiltersCollapsed = false;

        // Chart instances
        let charts = {
            prefill: null,
            decode: null,
            ttft: null,
            itl: null
        };

        function getShareIdFromUrl() {
            const params = new URLSearchParams(window.location.search || '');
            return (params.get('id') || params.get('share_id') || params.get('shareId') || '').trim();
        }

        function buildGlobalFilterParams() {
            const params = [];
            if (currentMinDecode > 0) {
                params.push(`avg_decode_speed=gte.${currentMinDecode}`);
            }
            if (currentMinPrefill > 0) {
                params.push(`avg_prefill_speed=gte.${currentMinPrefill}`);
            }
            if (currentHardwareKeyword) {
                params.push(`hardware=ilike.${encodeURIComponent('*' + currentHardwareKeyword + '*')}`);
            }
            return params;
        }

        function buildModeFilterParams(mode, personalUserCode) {
            const params = [];

            if (mode === 'personal' && personalUserCode) {
                params.push(`user_code=eq.${encodeURIComponent(personalUserCode)}`);
            } else if (mode === 'user' && currentTargetUserCode) {
                params.push(`user_code=eq.${encodeURIComponent(currentTargetUserCode)}`);
            } else if (mode === 'model' && currentTargetModelName) {
                params.push(`model_name=eq.${encodeURIComponent(currentTargetModelName)}`);
            } else if (mode === 'search_id' && currentTargetSearch) {
                const q = currentTargetSearch.trim();
                const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(q);
                if (isUUID) {
                    params.push(`id=eq.${encodeURIComponent(q)}`);
                } else {
                    const eq = encodeURIComponent(q);
                    const like = encodeURIComponent(`%${q}%`);
                    params.push(`or=(user_code.eq.${eq},nickname.ilike.${like},model_name.ilike.${like})`);
                }
            }

            return params;
        }

        function buildSortParam() {
            if (!SORTABLE_FIELDS.includes(currentSortKey)) currentSortKey = 'created_at';
            if (currentSortDirection !== 'asc' && currentSortDirection !== 'desc') currentSortDirection = 'desc';
            const nullsSuffix = currentSortKey === 'created_at' ? '' : '.nullslast';
            return `order=${currentSortKey}.${currentSortDirection}${nullsSuffix}`;
        }

        function buildSupabaseResultsUrl(mode, offset, personalUserCode) {
            const sbBase = SUPABASE_URL + '/rest/v1/speed_results';
            const queryParts = [
                'select=id,user_code,nickname,model_name,hardware,framework,quantization,notes,concurrency,avg_prefill_speed,avg_decode_speed,results_json,created_at',
                buildSortParam(),
                `limit=${currentPageSize}`,
                `offset=${offset}`,
                ...buildModeFilterParams(mode, personalUserCode),
                ...buildGlobalFilterParams()
            ];
            return `${sbBase}?${queryParts.join('&')}`;
        }

        function buildSupabaseModelTagUrl(offset, limit) {
            const sbBase = SUPABASE_URL + '/rest/v1/speed_results';
            const queryParts = [
                'select=model_name',
                'model_name=not.is.null',
                `limit=${limit}`,
                `offset=${offset}`,
                ...buildGlobalFilterParams()
            ];
            return `${sbBase}?${queryParts.join('&')}`;
        }

        async function fetchLeaderboardRows(mode, offset, signal, personalUserCode) {
            const url = buildSupabaseResultsUrl(mode, offset, personalUserCode);
            const response = await fetch(url, { signal, headers: SB_HEADERS });
            if (!response.ok) throw new Error(`HTTP error ${response.status}`);
            return await response.json();
        }

        async function fetchModelTags(signal) {
            const counts = new Map();
            let offset = 0;

            while (offset < MODEL_TAG_FETCH_LIMIT) {
                const limit = Math.min(MODEL_TAG_PAGE_SIZE, MODEL_TAG_FETCH_LIMIT - offset);
                const url = buildSupabaseModelTagUrl(offset, limit);
                const response = await fetch(url, { signal, headers: SB_HEADERS });
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);

                const rows = await response.json();
                if (!Array.isArray(rows) || rows.length === 0) break;

                rows.forEach((row) => {
                    const modelName = (row.model_name || '').trim();
                    if (!modelName) return;
                    counts.set(modelName, (counts.get(modelName) || 0) + 1);
                });

                offset += rows.length;
                if (rows.length < limit) break;
            }

            return Array.from(counts.entries())
                .filter(([, count]) => count >= MODEL_TAG_MIN_COUNT)
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'))
                .map(([name, count]) => ({ name, count }));
        }

        async function refreshModelTags() {
            if (modelTagFetchController) {
                modelTagFetchController.abort();
            }
            modelTagFetchController = new AbortController();

            try {
                currentModelTags = await fetchModelTags(modelTagFetchController.signal);
            } catch (e) {
                if (e.name === 'AbortError') return;
                currentModelTags = [];
                console.error('Failed to load model tags:', e);
            }

            renderModelTagBar();
        }

        function renderModelTagBar() {
            const panel = document.getElementById('modelTagsPanel');
            const bar = document.getElementById('modelTagBar');
            if (!panel || !bar) return;

            const tagsToRender = currentModelTags.slice();
            if (currentMode === 'model' && currentTargetModelName && !tagsToRender.some((tag) => tag.name === currentTargetModelName)) {
                tagsToRender.unshift({ name: currentTargetModelName, count: null });
            }

            if (!tagsToRender.length) {
                panel.style.display = 'none';
                bar.innerHTML = '';
                return;
            }

            const allActive = currentMode !== 'model' || !currentTargetModelName;
            const tagHtml = [
                `<button type="button" class="model-tag${allActive ? ' active' : ''}" onclick="clearModelTagSelection()">全部</button>`
            ];

            tagsToRender.forEach((tag) => {
                const active = currentMode === 'model' && currentTargetModelName === tag.name;
                const countHtml = Number.isFinite(tag.count) ? `<span class="model-tag-count">${tag.count}</span>` : '';
                tagHtml.push(
                    `<button type="button" class="model-tag${active ? ' active' : ''}" onclick="selectModelTag('${encodeURIComponent(tag.name)}')"><span>${escapeHtml(tag.name)}</span>${countHtml}</button>`
                );
            });

            bar.innerHTML = tagHtml.join('');
            panel.style.display = 'block';
        }

        function selectModelTag(encodedModelName) {
            loadModelLeaderboard(encodedModelName);
        }

        function clearModelTagSelection() {
            currentTargetModelName = null;
            const tabModel = document.getElementById('tabModel');
            if (tabModel) {
                tabModel.style.display = 'none';
                tabModel.classList.remove('active');
            }
            loadLeaderboard('global');
        }

        function getSortIndicator(key) {
            if (currentSortKey !== key) return '↕';
            return currentSortDirection === 'asc' ? '↑' : '↓';
        }

        function updateSortIndicators() {
            SORTABLE_FIELDS.forEach((key) => {
                const indicator = document.getElementById(`sortIndicator-${key}`);
                const header = document.getElementById(`sortHeader-${key}`);
                const active = currentSortKey === key;
                if (indicator) {
                    indicator.textContent = getSortIndicator(key);
                    indicator.classList.toggle('active', active);
                }
                if (header) {
                    header.setAttribute('aria-sort', active ? (currentSortDirection === 'asc' ? 'ascending' : 'descending') : 'none');
                }
            });
        }

        function toggleSort(key) {
            if (!SORTABLE_FIELDS.includes(key)) return;
            if (currentSortKey === key) {
                currentSortDirection = currentSortDirection === 'desc' ? 'asc' : 'desc';
            } else {
                currentSortKey = key;
                currentSortDirection = 'desc';
            }
            updateSortIndicators();
            loadLeaderboard(currentMode, true);
        }

        function normalizeLeaderboardRows(data) {
            return (Array.isArray(data) ? data : []).map(row => {
                let details = row.results_json ?? row.results ?? [];
                if (typeof details === 'string') {
                    try { details = JSON.parse(details); } catch { details = []; }
                }
                if (!Array.isArray(details)) details = [];
                return { ...row, results_json: details };
            });
        }

        function formatRankLabel(rank) {
            if (rank === 1) return '🥇 #1';
            if (rank === 2) return '🥈 #2';
            if (rank === 3) return '🥉 #3';
            return `#${rank}`;
        }

        function buildShareReportUrl(id) {
            const url = new URL('https://gengchaogit.github.io/llm_speedtest/LLM_Speed_Test_v3_Leaderboard.html');
            url.searchParams.set('id', id);
            return url.toString();
        }

        async function copyShareUrl(encodedId, btn) {
            const id = decodeURIComponent(encodedId || '');
            if (!id) return;
            const shareUrl = buildShareReportUrl(id);
            try {
                await navigator.clipboard.writeText(shareUrl);
                if (btn) {
                    const prev = btn.textContent;
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = prev, 1200);
                }
            } catch {
                window.prompt('复制分享链接：', shareUrl);
            }
        }

        async function copyCommunityGroup(btn) {
            const groupNumber = '1028429001';
            try {
                await navigator.clipboard.writeText(groupNumber);
                if (btn) {
                    const prev = btn.textContent;
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = prev, 1200);
                }
            } catch {
                window.prompt('复制QQ群号：', groupNumber);
            }
        }

        function isPhysicalMobileViewport() {
            return window.matchMedia('(max-width: 900px)').matches;
        }

        function isMobileViewport() {
            return manualMobileView || isPhysicalMobileViewport();
        }

        function applyManualViewMode() {
            document.body.classList.toggle('force-mobile-view', manualMobileView);
            const btn = document.getElementById('manualViewToggleBtn');
            if (btn) {
                btn.textContent = manualMobileView ? '恢复默认视图' : '切换手机视图';
            }
        }

        function toggleManualMobileView() {
            manualMobileView = !manualMobileView;
            try {
                localStorage.setItem(VIEW_MODE_STORAGE_KEY, manualMobileView ? 'mobile' : 'auto');
            } catch { }
            applyManualViewMode();
            syncMobileFilterPanel(true);
        }
        function setMobileFilterCollapsed(collapsed) {
            const wrap = document.getElementById('leaderboardToolsWrap');
            const toggle = document.getElementById('mobileFilterToggle');
            if (!wrap || !toggle) return;

            mobileFiltersCollapsed = !!collapsed;
            wrap.classList.toggle('collapsed', mobileFiltersCollapsed);
            toggle.setAttribute('aria-expanded', mobileFiltersCollapsed ? 'false' : 'true');
            toggle.textContent = mobileFiltersCollapsed ? '展开筛选条件' : '收起筛选条件';
        }

        function toggleMobileFilters() {
            if (!isMobileViewport()) return;
            setMobileFilterCollapsed(!mobileFiltersCollapsed);
        }

        function syncMobileFilterPanel(forceCollapse = false) {
            const mobile = isMobileViewport();
            if (!mobile) {
                setMobileFilterCollapsed(false);
            } else if (forceCollapse || !wasMobileViewport) {
                setMobileFilterCollapsed(true);
            }
            wasMobileViewport = mobile;
        }

        function applyLeaderboardFilters() {
            currentPageSize = parseInt(document.getElementById('pageSizeSelect')?.value || PAGE_SIZE, 10) || PAGE_SIZE;
            currentMinDecode = parseFloat(document.getElementById('minDecodeInput')?.value || '0') || 0;
            currentMinPrefill = parseFloat(document.getElementById('minPrefillInput')?.value || '0') || 0;
            currentHardwareKeyword = (document.getElementById('hardwareFilterInput')?.value || '').trim();

            const searchQuery = (document.getElementById('searchInput')?.value || '').trim();
            refreshModelTags();
            if (isMobileViewport()) setMobileFilterCollapsed(true);

            if (searchQuery) {
                currentTargetSearch = searchQuery;
                loadLeaderboard('search_id', true);
                return;
            }

            currentTargetSearch = null;
            if (currentMode === 'search_id') {
                loadLeaderboard('global', true);
                return;
            }

            loadLeaderboard(currentMode, true);
        }

        function resetLeaderboardFilters() {
            currentPageSize = PAGE_SIZE;
            currentMinDecode = 0;
            currentMinPrefill = 0;
            currentHardwareKeyword = '';
            currentTargetSearch = null;
            const pageEl = document.getElementById('pageSizeSelect');
            const minDecodeEl = document.getElementById('minDecodeInput');
            const minPrefillEl = document.getElementById('minPrefillInput');
            const hwEl = document.getElementById('hardwareFilterInput');
            const searchEl = document.getElementById('searchInput');
            if (pageEl) pageEl.value = String(PAGE_SIZE);
            if (minDecodeEl) minDecodeEl.value = '';
            if (minPrefillEl) minPrefillEl.value = '';
            if (hwEl) hwEl.value = '';
            if (searchEl) searchEl.value = '';
            refreshModelTags();
            if (isMobileViewport()) setMobileFilterCollapsed(true);
            if (currentMode === 'search_id') {
                loadLeaderboard('global', true);
                return;
            }
            loadLeaderboard(currentMode, true);
        }

        window.onload = () => {
            const pageEl = document.getElementById('pageSizeSelect');
            if (pageEl) pageEl.value = String(currentPageSize);
            updateSortIndicators();
            applyManualViewMode();
            syncMobileFilterPanel(true);
            window.addEventListener('resize', () => {
                if (isMobileViewport() !== wasMobileViewport) {
                    syncMobileFilterPanel(true);
                }
            });

            ['hardwareFilterInput', 'minDecodeInput', 'minPrefillInput'].forEach((id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('keydown', (event) => {
                        if (event.key === 'Enter') applyLeaderboardFilters();
                    });
                }
            });

            refreshModelTags();

            const shareId = getShareIdFromUrl();
            if (shareId) {
                pendingDeepLinkShareId = shareId;
                currentTargetSearch = shareId;
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = shareId;
                loadLeaderboard('search_id');
                return;
            }
            loadLeaderboard('global');
        };

        async function loadLeaderboard(mode, resetPage = true) {
            if (resetPage) {
                currentPage = 1;
            }
            currentMode = mode;
            renderModelTagBar();
            updateSortIndicators();
            document.getElementById('tabGlobal').classList.toggle('active', mode === 'global');
            document.getElementById('tabPersonal').classList.toggle('active', mode === 'personal');

            const tabUser = document.getElementById('tabUser');
            if (mode === 'user') {
                tabUser.style.display = 'inline-block';
                tabUser.classList.add('active');
            } else {
                tabUser.classList.remove('active');
                tabUser.style.display = 'none';
            }

            const tabModel = document.getElementById('tabModel');
            if (mode === 'model') {
                tabModel.style.display = 'inline-block';
                tabModel.classList.add('active');
            } else {
                tabModel.classList.remove('active');
                tabModel.style.display = 'none';
            }

            const tabSearchId = document.getElementById('tabSearchId');
            if (mode === 'search_id') {
                tabSearchId.style.display = 'inline-block';
                tabSearchId.classList.add('active');
            } else {
                tabSearchId.classList.remove('active');
                tabSearchId.style.display = 'none';
            }

            const tbody = document.getElementById('resultsBody');
            const loading = document.getElementById('loadingIndicator');
            const table = document.getElementById('resultsTable');
            const pagination = document.getElementById('paginationControls');
            const pageIndicator = document.getElementById('pageIndicator');
            const btnPrev = document.getElementById('btnPrevPage');
            const btnNext = document.getElementById('btnNextPage');

            // Abort previous fetch if any
            if (currentFetchController) {
                currentFetchController.abort();
            }
            currentFetchController = new AbortController();
            const signal = currentFetchController.signal;

            tbody.innerHTML = '';
            table.style.display = 'none';
            pagination.style.display = 'none';
            loading.style.display = 'block';
            loading.textContent = '加载中... ⏳';

            try {
                const offset = (currentPage - 1) * currentPageSize;
                let personalUserCode = null;
                if (mode === 'personal') {
                    personalUserCode = localStorage.getItem(USER_CODE_KEY);
                    if (!personalUserCode) {
                        loading.textContent = '暂无本地用户识别码，无法查询个人记录。请先运行测试。';
                        return;
                    }
                }

                let data = await fetchLeaderboardRows(mode, offset, signal, personalUserCode);
                data = normalizeLeaderboardRows(data);

                if (!data || data.length === 0) {
                    loading.textContent = '暂无数据 📭';
                    return;
                }

                resultsDataMap = {};

                data.forEach((row, idx) => {
                    resultsDataMap[row.id] = row;

                    const tr = document.createElement('tr');
                    const rank = offset + idx + 1;
                    if (currentPage === 1 && rank <= 3) tr.classList.add(`top-rank-${rank}`);

                    // Format date
                    const d = new Date(row.created_at);
                    const dateStr = d.getFullYear() + '-' +
                        String(d.getMonth() + 1).padStart(2, '0') + '-' +
                        String(d.getDate()).padStart(2, '0') + ' ' +
                        String(d.getHours()).padStart(2, '0') + ':' +
                        String(d.getMinutes()).padStart(2, '0') + ':' +
                        String(d.getSeconds()).padStart(2, '0');

                    // Format user/model display - Clickable to search
                    const displayName = row.nickname || row.user_code || '匿名用户';
                    const encodedUserCode = encodeURIComponent(row.user_code || '');
                    const encodedDisplayName = encodeURIComponent(displayName);
                    const userDisplay = row.user_code
                        ? `<span style="color:#e5c07b; cursor:pointer; text-decoration:underline;" onclick="loadUserLeaderboard('${encodedUserCode}', '${encodedDisplayName}')" title="点击查看该用户的所有记录">${escapeHtml(displayName)}</span>`
                        : escapeHtml(displayName);

                    const modelName = row.model_name || '';
                    const encodedModelName = encodeURIComponent(modelName);
                    const modelDisplay = modelName
                        ? `<span style="color:#61afef; cursor:pointer; text-decoration:underline;" onclick="loadModelLeaderboard('${encodedModelName}')" title="点击查看所有同名模型记录">${escapeHtml(modelName)}</span>`
                        : '-';

                    // Config text
                    const configText = [row.hardware, row.framework, row.quantization].filter(Boolean).map(escapeHtml).join(' / ');
                    const notesText = row.notes ? escapeHtml(row.notes) : '-';
                    const prefillText = Number.isFinite(Number(row.avg_prefill_speed)) ? Number(row.avg_prefill_speed).toFixed(1) : '-';
                    const decodeText = Number.isFinite(Number(row.avg_decode_speed)) ? Number(row.avg_decode_speed).toFixed(1) : '-';

                    tr.innerHTML = `
                    <td class="rank-cell col-rank">${formatRankLabel(rank)}</td>
                    <td class="col-time">${dateStr}</td>
                    <td class="col-share-id" style="font-family:monospace; font-size:12px; color:#5c6370; user-select:all;">${escapeHtml(row.id)}</td>
                    <td class="col-user">${userDisplay}</td>
                    <td class="col-model" style="font-weight:bold;">${modelDisplay}</td>
                    <td class="col-config" style="font-size:12px;">${configText}</td>
                    <td class="notes-cell col-notes">
                        <span class="notes-text">${notesText}</span>
                        ${row.notes ? `<div class="notes-tooltip">${notesText}</div>` : ''}
                    </td>
                    <td class="col-concurrency">${row.concurrency}</td>
                    <td class="col-prefill" style="color:#98c379; font-weight:bold;">${prefillText}</td>
                    <td class="col-decode" style="color:#c678dd; font-weight:bold;">${decodeText}</td>
                    <td class="col-actions"><button class="btn-detail" onclick="viewDetails('${row.id}')">查看图表</button><button class="btn-copy-link" onclick="copyShareUrl('${encodeURIComponent(row.id)}', this)">复制链接</button></td>
                `;
                    tbody.appendChild(tr);
                });

                if (mode === 'search_id' && pendingDeepLinkShareId) {
                    const matched = data.find(row => row.id === pendingDeepLinkShareId);
                    pendingDeepLinkShareId = null;
                    if (matched) viewDetails(matched.id);
                }

                loading.style.display = 'none';
                table.style.display = 'table';

                // Pagination display logic
                pagination.style.display = 'block';
                pageIndicator.textContent = `第 ${currentPage} 页 · 每页 ${currentPageSize} 条`;
                btnPrev.style.display = currentPage > 1 ? 'inline-block' : 'none';
                // If we got fewer results than PAGE_SIZE, we hit the end
                btnNext.style.display = data.length === currentPageSize ? 'inline-block' : 'none';

            } catch (e) {
                if (e.name === 'AbortError') {
                    console.log('Fetch aborted due to tab switch.');
                    return;
                }
                loading.textContent = `❌ 加载失败: ${e.message}`;
                console.error(e);
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function loadUserLeaderboard(encodedUserCode, encodedDisplayName) {
            const userCode = decodeURIComponent(encodedUserCode || '');
            const displayName = decodeURIComponent(encodedDisplayName || encodedUserCode || '');
            if (!userCode) return;

            currentTargetUserCode = userCode;
            const tabUser = document.getElementById('tabUser');
            tabUser.textContent = `🔍 [${displayName || userCode}] 的记录`;
            tabUser.style.display = 'inline-block';
            loadLeaderboard('user');
        }

        function loadModelLeaderboard(encodedModelName) {
            const modelName = decodeURIComponent(encodedModelName || '');
            if (!modelName) return;

            currentTargetModelName = modelName;
            const tabModel = document.getElementById('tabModel');
            tabModel.textContent = `🏷️ [${modelName}] 的记录`;
            tabModel.style.display = 'inline-block';
            loadLeaderboard('model');
        }

        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            loadLeaderboard(currentMode, false);
        }

        // --- Chart Generation Logic ---

        function closeCharts() {
            document.getElementById('chartModal').style.display = 'none';
        }

        // Click outside to close
        window.onclick = function (event) {
            const modal = document.getElementById('chartModal');
            if (event.target === modal) {
                closeCharts();
            }
        }

        function viewDetails(id) {
            const row = resultsDataMap[id];
            if (!row) return;

            document.getElementById('modalTitle').textContent = row.model_name;
            document.getElementById('modalSubtitle').textContent =
                `硬件: ${row.hardware} | 并发: ${row.concurrency} | 记录时间: ${new Date(row.created_at).toLocaleString()}`;

            document.getElementById('chartModal').style.display = 'block';

            const rawResults = row.results_json || [];
            // Normalize per-point schema so both snake_case and camelCase records render correctly.
            const sortedData = (Array.isArray(rawResults) ? rawResults : []).map(item => {
                const promptLength = Number(item?.prompt_length ?? item?.promptLength ?? item?.prompt_tokens);
                const prefillSpeed = Number(item?.prefill_speed ?? item?.prefillSpeed);
                const outputSpeed = Number(item?.output_speed ?? item?.outputSpeed ?? item?.decode_speed ?? item?.decodeSpeed);
                const avgTtftMs = Number(item?.avg_ttft_ms ?? item?.avgTtftMs);
                const avgItlMean = Number(item?.avg_itl_mean ?? item?.avgItlMean);
                const successRaw = item?.successful;
                const successful = successRaw !== undefined && successRaw !== null
                    ? Number(successRaw)
                    : ((Number.isFinite(prefillSpeed) || Number.isFinite(outputSpeed)) ? 1 : 0);

                return {
                    ...item,
                    prompt_length: Number.isFinite(promptLength) ? promptLength : null,
                    prefill_speed: Number.isFinite(prefillSpeed) ? prefillSpeed : null,
                    output_speed: Number.isFinite(outputSpeed) ? outputSpeed : null,
                    avg_ttft_ms: Number.isFinite(avgTtftMs) ? avgTtftMs : null,
                    avg_itl_mean: Number.isFinite(avgItlMean) ? avgItlMean : null,
                    successful: successful ? 1 : 0
                };
            }).sort((a, b) => (a.prompt_length ?? Number.MAX_SAFE_INTEGER) - (b.prompt_length ?? Number.MAX_SAFE_INTEGER));

            // ================== Build Detail Data Table ==================
            const dataContainer = document.getElementById('modalDataContainer');
            let tableHtml = `
            <table style="width:100%; border-collapse:collapse; margin-bottom:20px; font-size:13px;">
                <thead>
                    <tr style="background:var(--bg-panel);">
                        <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border-color); color:var(--accent-green);">提示词长度<br>(tokens)</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border-color); color:var(--accent-yellow);">TTFT<br>(ms)</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border-color); color:var(--accent-yellow);">ITL平均<br>(ms)</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border-color); color:var(--accent-purple);">预填充速度<br>(tokens/s)</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border-color); color:var(--accent-purple);">输出速度<br>(tokens/s)</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid var(--border-color);">状态</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let minPrefill = Infinity, maxPrefill = 0, sumPrefill = 0;
            let minDecode = Infinity, maxDecode = 0, sumDecode = 0;
            let validPoints = 0;
            const prefillList = [], decodeList = [];

            sortedData.forEach(r => {
                const ttft = (r.avg_ttft_ms !== null && r.avg_ttft_ms !== undefined) ? r.avg_ttft_ms.toFixed(2) : 'N/A';
                const itl = (r.avg_itl_mean !== null && r.avg_itl_mean !== undefined) ? r.avg_itl_mean.toFixed(2) : 'N/A';
                const pSpeed = (r.prefill_speed !== null && r.prefill_speed !== undefined) ? r.prefill_speed.toFixed(2) : 'N/A';
                const dSpeed = (r.output_speed !== null && r.output_speed !== undefined) ? r.output_speed.toFixed(2) : 'N/A';
                const statusStr = r.successful ? `<span style="color:#98c379;">1/1 并发成功</span>` : `<span style="color:#e06c75;">失败</span>`;

                tableHtml += `
                    <tr style="border-bottom:1px solid var(--border-color);">
                        <td style="padding:10px;">${r.prompt_length ?? 'N/A'}</td>
                        <td style="padding:10px;">${ttft}</td>
                        <td style="padding:10px;">${itl}</td>
                        <td style="padding:10px;">${pSpeed}</td>
                        <td style="padding:10px;">${dSpeed}</td>
                        <td style="padding:10px;">${statusStr}</td>
                    </tr>
                `;

                if (r.prefill_speed && !isNaN(r.prefill_speed)) {
                    minPrefill = Math.min(minPrefill, r.prefill_speed);
                    maxPrefill = Math.max(maxPrefill, r.prefill_speed);
                    sumPrefill += r.prefill_speed;
                    prefillList.push(r.prefill_speed);
                }

                if (r.output_speed && !isNaN(r.output_speed)) {
                    minDecode = Math.min(minDecode, r.output_speed);
                    maxDecode = Math.max(maxDecode, r.output_speed);
                    sumDecode += r.output_speed;
                    decodeList.push(r.output_speed);
                    validPoints++;
                }
            });

            tableHtml += `</tbody></table>`;

            if (validPoints > 0) {
                const avgP = (sumPrefill / validPoints).toFixed(2);
                const avgD = (sumDecode / validPoints).toFixed(2);

                const calcPct = (arr, p) => {
                    if (!arr.length) return 0;
                    const sorted = [...arr].sort((a, b) => a - b);
                    const pos = (sorted.length - 1) * p;
                    const base = Math.floor(pos);
                    const rest = pos - base;
                    return sorted[base + 1] !== undefined ? sorted[base] + rest * (sorted[base + 1] - sorted[base]) : sorted[base];
                };

                const p50P = calcPct(prefillList, 0.5).toFixed(2);
                const p90P = calcPct(prefillList, 0.9).toFixed(2);
                const p95P = calcPct(prefillList, 0.95).toFixed(2);

                const p50D = calcPct(decodeList, 0.5).toFixed(2);
                const p90D = calcPct(decodeList, 0.9).toFixed(2);
                const p95D = calcPct(decodeList, 0.95).toFixed(2);

                tableHtml += `
                <div style="background:var(--bg-panel); border:1px solid var(--border-color); border-radius:6px; padding:20px; font-size:14px; color:var(--text-main);">
                    <h3 style="color:var(--accent-blue); margin-top:0; margin-bottom:15px; font-size:16px;">总吞吐量性能统计 (${row.concurrency} 并发)</h3>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>总预填充吞吐范围：</span><span style="color:var(--accent-green);">${minPrefill.toFixed(2)} - ${maxPrefill.toFixed(2)} tokens/s</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>总输出吞吐范围：</span><span style="color:var(--accent-purple);">${minDecode.toFixed(2)} - ${maxDecode.toFixed(2)} tokens/s</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>平均总预填充吞吐：</span><span style="color:var(--accent-green); font-weight:bold;">${avgP} tokens/s</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <span>平均总输出吞吐：</span><span style="color:var(--accent-purple); font-weight:bold;">${avgD} tokens/s</span>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--border-color); margin-bottom:15px;">
                    <h3 style="color:var(--text-muted); margin-top:0; margin-bottom:15px; font-size:14px;">📊 百分位统计 (P50/P90/P95)</h3>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>Prefill 吞吐：</span><span style="color:var(--accent-green);">P50: ${p50P} | P90: ${p90P} | P95: ${p95P} tokens/s</span>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <span>Decode 吞吐：</span><span style="color:var(--accent-purple);">P50: ${p50D} | P90: ${p90D} | P95: ${p95D} tokens/s</span>
                    </div>
                </div>`;
            }

            dataContainer.innerHTML = tableHtml;
            // ==============================================================

            const labels = sortedData.map(d => (d.prompt_length ?? 'N/A').toString());

            // Extract datasets robustly
            const mapToNullIfNaN = (val) => (val === null || val === undefined || isNaN(val)) ? null : val;

            const prefillData = sortedData.map(d => mapToNullIfNaN(d.prefill_speed));
            const decodeData = sortedData.map(d => mapToNullIfNaN(d.output_speed));
            const ttftData = sortedData.map(d => mapToNullIfNaN(d.avg_ttft_ms));
            const itlData = sortedData.map(d => mapToNullIfNaN(d.avg_itl_mean));

            Chart.defaults.color = '#abb2bf';
            Chart.defaults.borderColor = '#3e4451';

            buildChart('prefill', 'prefillChart', '总 Prefill 吞吐 (tokens/s)', labels, prefillData, '#98c379');
            buildChart('decode', 'decodeChart', '总 Decode 吞吐 (tokens/s)', labels, decodeData, '#c678dd');
            buildChart('ttft', 'ttftChart', 'TTFT 首字延迟 (ms)', labels, ttftData, '#61afef');
            buildChart('itl', 'itlChart', 'ITL 均值延迟 (ms)', labels, itlData, '#e5c07b');
        }

        function buildChart(key, canvasId, label, labels, data, color) {
            if (charts[key]) {
                charts[key].destroy();
            }

            const ctx = document.getElementById(canvasId).getContext('2d');

            // 检查是否所有数据都是 null
            const allNull = data.every(d => d === null);

            charts[key] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: allNull ? label + ' (无有效数据)' : label,
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '33',
                        borderWidth: 2,
                        pointBackgroundColor: color,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: false,
                        tension: 0.1,
                        spanGaps: true // 健壮性：有缺失点也能连线
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#abb2bf' }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(33, 37, 43, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#abb2bf',
                            borderColor: '#3e4451',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Prompt Tokens', color: '#5c6370' },
                            grid: { color: '#3e4451' }
                        },
                        y: {
                            title: { display: true, text: label.split(' ')[1], color: '#5c6370' },
                            grid: { color: '#3e4451' },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

    </script>
</body>

</html>
